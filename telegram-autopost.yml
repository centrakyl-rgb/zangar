name: Telegram autopost

on:
  schedule:
    # 09:00 Europe/Moscow = 06:00 UTC.
    # GitHub Actions использует UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: telegram-autopost
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish next post
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POSTS_FILE: posts.md
          STATE_FILE: state.json
        run: python scripts/autopost.py

      - name: Save updated state
        run: |
          if git diff --quiet -- state.json; then
            echo "state.json не изменился"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update Telegram autopost state"
          git pull --rebase
          git push
